<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Performance Predictor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 60%, #0f172a 100%);
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #e2e8f0;
    }

    .hero {
      text-align: center;
      max-width: 560px;
      padding: 2rem;
    }

    .badge {
      display: inline-block;
      background: rgba(99,179,237,0.15);
      border: 1px solid rgba(99,179,237,0.35);
      color: #63b3ed;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.35rem 1rem;
      border-radius: 999px;
      margin-bottom: 1.5rem;
    }

    h1 {
      font-size: 2.6rem;
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 1rem;
      background: linear-gradient(90deg, #e2e8f0, #63b3ed);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    p {
      font-size: 1.05rem;
      color: #94a3b8;
      line-height: 1.7;
      margin-bottom: 2.5rem;
    }

    .btn {
      display: inline-block;
      background: linear-gradient(135deg, #3b82f6, #1d4ed8);
      color: #fff;
      text-decoration: none;
      padding: 0.85rem 2.2rem;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 20px rgba(59,130,246,0.4);
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(59,130,246,0.55);
    }

    .stats {
      display: flex;
      justify-content: center;
      gap: 2.5rem;
      margin-top: 3rem;
      padding-top: 2rem;
      border-top: 1px solid rgba(255,255,255,0.08);
    }

    .stat-item span {
      display: block;
    }

    .stat-num {
      font-size: 1.5rem;
      font-weight: 700;
      color: #63b3ed;
    }

    .stat-label {
      font-size: 0.78rem;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-top: 0.2rem;
    }
  </style>
</head>
<body>
  <div class="hero">
<h1>Student Exam Performance Predictor</h1>
    <p>Enter student demographic and academic details to predict their expected math score using a trained machine learning model.</p>
    <a href="/predictdata" class="btn">Get Prediction &rarr;</a>
    <div class="stats">
      <div class="stat-item">
        <span class="stat-num">7</span>
        <span class="stat-label">Models Evaluated</span>
      </div>
      <div class="stat-item">
        <span class="stat-num">R²</span>
        <span class="stat-label">Metric Used</span>
      </div>
      <div class="stat-item">
        <span class="stat-num">7</span>
        <span class="stat-label">Input Features</span>
      </div>
    </div>
  </div>
</body>
</html>
